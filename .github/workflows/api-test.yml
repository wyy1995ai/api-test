name: API自动化测试

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 安装 Newman
        run: npm install -g newman
      
      - name: 运行 API 测试
        run: |
          newman run postman-collection.json \
            --reporters cli,json \
            --reporter-json-export test-report.json
      
      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.json
