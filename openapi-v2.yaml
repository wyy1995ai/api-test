openapi: 3.0.0
info:
  title: 订单API
  version: 2.0.0
servers:
  - url: https://api.example.com/v2
paths:
  /orders/{order_id}:
    get:
      summary: 获取订单详情
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                    example: "123"
                  status:
                    type: integer
                    example: 1
                  sub_status:
                    type: integer
                    description: 子状态，新增字段
                    example: 0
                  promotion_id:
                    type: string
                    description: 促销活动ID，新增字段
                    example: "PROMO_001"
                  amount:
                    type: string
                    description: 金额，类型从number变为string
                    example: "99.5"
