openapi: 3.0.0
info:
  title: 订单API
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
paths:
  /orders/{order_id}:
    get:
      summary: 获取订单详情
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                    example: "123"
                  status:
                    type: integer
                    example: 1
                  amount:
                    type: number
                    example: 99.5
